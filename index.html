<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download CodeShare</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #111827;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #cbd5f5;
        }

        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #2563eb;
        }

        .version {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CodeShare</h1>
        <p>Share your code, chat with developers, and build amazing apps.</p>

        <!-- ضع رابط تحميل التطبيق هنا -->
        <a href="https://github.com/Nexora-t/Code-share/blob/main/app-release%20(1).apk" class="download-btn">
            Download App
        </a>

        <div class="version">
            Version 1.0 • Android
        </div>
    </div>

</body>
</html>
